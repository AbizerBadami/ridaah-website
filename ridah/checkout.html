<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout – Ridah</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>
<header id="site-header"></header>

<div class="page-banner">
  <p class="eyebrow">Almost there</p>
  <h1>Checkout</h1>
  <p class="breadcrumb"><a href="index.html">Home</a> › <a href="cart.html">Cart</a> › Checkout</p>
</div>

<main>
<div class="cart-layout" style="padding-top:2rem;">
  <!-- Shipping form -->
  <div>
    <div class="form-card" style="margin-bottom:1.5rem;">
      <h3 class="form-title">Shipping Address</h3>
      <div class="form-row">
        <div class="form-group">
          <label>First Name *</label>
          <input type="text" id="sh-fname" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="sh-lname">
        </div>
      </div>
      <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" id="sh-phone" placeholder="+91 99999 99999" required>
      </div>
      <div class="form-group">
        <label>Address Line 1 *</label>
        <input type="text" id="sh-addr1" placeholder="House/flat number, building name" required>
      </div>
      <div class="form-group">
        <label>Address Line 2</label>
        <input type="text" id="sh-addr2" placeholder="Street, locality">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>City *</label>
          <input type="text" id="sh-city" required>
        </div>
        <div class="form-group">
          <label>State *</label>
          <input type="text" id="sh-state" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>PIN Code *</label>
          <input type="text" id="sh-pin" placeholder="400001" maxlength="6" required>
        </div>
        <div class="form-group">
          <label>Country</label>
          <input type="text" id="sh-country" value="India">
        </div>
      </div>
    </div>

    <div class="form-card">
      <h3 class="form-title">Shipping Method</h3>
      <label class="filter-option" style="padding:.75rem;border:1.5px solid var(--teal);border-radius:var(--radius-sm);margin-bottom:.5rem;background:rgba(44,110,106,.04);">
        <input type="radio" name="shipping" value="standard" checked>
        <div style="margin-left:.5rem;">
          <p style="font-weight:600;font-size:.875rem;">Standard Delivery (5–7 days)</p>
          <p style="font-size:.78rem;color:var(--gray);">Free on orders above ₹2,000</p>
        </div>
        <span style="margin-left:auto;font-weight:600;font-size:.875rem;" id="ship-std-price">FREE</span>
      </label>
      <label class="filter-option" style="padding:.75rem;border:1.5px solid var(--gray-lt);border-radius:var(--radius-sm);background:var(--white);">
        <input type="radio" name="shipping" value="express">
        <div style="margin-left:.5rem;">
          <p style="font-weight:600;font-size:.875rem;">Express Delivery (2–3 days)</p>
          <p style="font-size:.78rem;color:var(--gray);">Tracked door-to-door delivery</p>
        </div>
        <span style="margin-left:auto;font-weight:600;font-size:.875rem;">₹120</span>
      </label>
    </div>
  </div>

  <!-- Summary -->
  <div>
    <div class="order-summary-card">
      <h3 style="font-family:var(--font-display);font-size:1.3rem;margin-bottom:1.25rem;">Your Order</h3>
      <div id="order-items-summary" style="margin-bottom:1rem;font-size:.85rem;color:var(--gray);">
        <div class="spinner" style="margin:1rem auto;"></div>
      </div>
      <div class="summary-row"><span>Subtotal</span><span id="co-subtotal">—</span></div>
      <div class="summary-row"><span>Shipping</span><span id="co-shipping">—</span></div>
      <div class="summary-row total"><span>Total</span><span id="co-total">—</span></div>
      <p style="font-size:.75rem;color:var(--gray);margin:.75rem 0 1rem;">Payment via QR code on next step</p>
      <button class="btn btn-primary btn-full" id="place-btn" onclick="placeOrder()">Place Order →</button>
    </div>
  </div>
</div>
</main>

<footer id="site-footer"></footer>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script>
let cartItems = [];
let subtotal  = 0;

document.addEventListener('DOMContentLoaded', async () => {
  if (!Cart.count()) { window.location.href = 'cart.html'; return; }

  // Pre-fill from profile if logged in
  if (Auth.isLoggedIn()) {
    try {
      const user = await API.getProfile();
      if (user?.name) {
        const parts = (user.name || '').split(' ');
        document.getElementById('sh-fname').value = parts[0] || '';
        document.getElementById('sh-lname').value = parts.slice(1).join(' ') || '';
      }
      if (user?.phone)   document.getElementById('sh-phone').value  = user.phone;
      if (user?.address) document.getElementById('sh-addr1').value  = user.address;
    } catch {}
  }

  buildSummary();

  // Update shipping cost on radio change
  document.querySelectorAll('input[name=shipping]').forEach(r => r.addEventListener('change', buildSummary));
});

async function buildSummary() {
  cartItems = Cart.get();
  const summEl = document.getElementById('order-items-summary');
  subtotal = 0;

  // Compute from cached meta first (price stored on add)
  cartItems.forEach(i => { subtotal += (i.price || 0) * i.qty; });

  const shippingMethod = document.querySelector('input[name=shipping]:checked')?.value;
  const shippingCost   = shippingMethod === 'express' ? 120 : (subtotal >= 2000 ? 0 : 80);
  const total          = subtotal + shippingCost;

  summEl.innerHTML = cartItems.map(i => `
    <div style="display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid var(--ivory-dk);">
      <span>${i.name || 'Item'} × ${i.qty}${i.size ? ' ('+i.size+')' : ''}</span>
      <span>${formatPrice((i.price||0)*i.qty)}</span>
    </div>`).join('');

  document.getElementById('co-subtotal').textContent = formatPrice(subtotal);
  document.getElementById('co-shipping').textContent = shippingCost === 0 ? 'FREE' : formatPrice(shippingCost);
  document.getElementById('co-total').textContent    = formatPrice(total);
  document.getElementById('ship-std-price').textContent = subtotal >= 2000 ? 'FREE' : formatPrice(80);
}

async function placeOrder() {
  // Validate required fields
  const required = ['sh-fname','sh-phone','sh-addr1','sh-city','sh-state','sh-pin'];
  for (const id of required) {
    if (!document.getElementById(id).value.trim()) {
      Toast.show('Please fill in all required shipping fields.', 'error');
      document.getElementById(id).focus();
      return;
    }
  }

  const btn = document.getElementById('place-btn');
  btn.disabled = true;
  btn.textContent = 'Placing order…';

  const shippingAddress = {
    name:    `${document.getElementById('sh-fname').value.trim()} ${document.getElementById('sh-lname').value.trim()}`.trim(),
    phone:   document.getElementById('sh-phone').value.trim(),
    line1:   document.getElementById('sh-addr1').value.trim(),
    line2:   document.getElementById('sh-addr2').value.trim(),
    city:    document.getElementById('sh-city').value.trim(),
    state:   document.getElementById('sh-state').value.trim(),
    pin:     document.getElementById('sh-pin').value.trim(),
    country: document.getElementById('sh-country').value.trim() || 'India',
  };

  const shippingMethod = document.querySelector('input[name=shipping]:checked')?.value || 'standard';

  const payload = {
    items: cartItems.map(i => ({
      productId:     i.productId,
      customOrderId: i.customOrderId,
      qty:           i.qty,
      size:          i.size,
    })),
    shippingAddress,
    shippingMethod,
    paymentMethod: 'qr',
  };

  try {
    const res = await API.placeOrder(payload);
    const orderId = res?.orderId || res?._id;
    Cart.clear();
    Toast.show('Order placed! Proceeding to payment…', 'success');
    setTimeout(() => window.location.href = `payment.html?orderId=${orderId}`, 800);
  } catch (err) {
    // Demo fallback: simulate an order
    const demoId = 'DEMO-' + Date.now();
    Cart.clear();
    Toast.show('Demo mode: redirecting to payment', 'info');
    setTimeout(() => window.location.href = `payment.html?orderId=${demoId}`, 800);
  }
}
</script>
</body>
</html>
